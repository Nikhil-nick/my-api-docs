
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>API Documentation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Swagger UI CSS -->
  https://unpkg.com/swagger-ui-dist@5/swagger-ui.css
</head>

<body>
  <div id="swagger-ui"></div>

  <!-- Swagger UI JS -->
  https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js</script>
  https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js</script>

  <script>
    window.onload = () => {
      SwaggerUIBundle({
        url: "api_doc.json",
        dom_id: "#swagger-ui",
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: "BaseLayout"
      });
    };
  </script>
</body>
</html>
