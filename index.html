<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>API Documentation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Swagger UI CSS -->
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />
  <style>
    /* Optional: page fill and a small top padding */
    html, body { height: 100%; margin: 0; background: #fff; }
    #swagger-ui { max-width: 100%; box-sizing: border-box; padding-top: 8px; }
    /* Optional dark mode (auto) */
    @media (prefers-color-scheme: dark) {
      body { background: #0b0c10; }
    }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>

  <!-- Swagger UI JS -->
  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-standalone-preset.js"></script>

  <script>
    window.onload = () => {
      const ui = SwaggerUIBundle({
        // If api.json is in the same folder, this relative path works:
        url: "api_doc.json",
        // If your spec is elsewhere, use an absolute URL:
        // url: "https://raw.githubusercontent.com/<user>/<repo>/main/path/to/api.json",

        dom_id: "#swagger-ui",
        deepLinking: true,
        layout: "BaseLayout", // Alternatives: "StandaloneLayout"
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        // Enable/disable features as needed:
        tryItOutEnabled: true,
        filter: true,              // enables the search box
        displayRequestDuration: true,
        docExpansion: "none",      // "none" | "list" | "full"
        defaultModelExpandDepth: 1,
        defaultModelsExpandDepth: 1,
        showExtensions: true,
        showCommonExtensions: true,

        // If you use OAuth flows in your OpenAPI:
        // oauth2RedirectUrl: window.location.origin + window.location.pathname.replace(/\/$/, '') + "/oauth2-redirect.html",
      });

      // Optional: OAuth init if using OAuth2 in your API
      // ui.initOAuth({
      //   clientId: "your-client-id",
      //   scopes: ["read", "write"]
      // });
      window.ui = ui;
    };
  </script>
</body>
</html>
